name: Android CI

on:
  push:
    paths-ignore:
      - '**.md'
      - 'internalResources/**'
      - '.github/workflows/ios.yml'
      - '.github/workflows/cache-cleanup.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'internalResources/**'
      - '.github/workflows/ios.yml'
      - '.github/workflows/cache-cleanup.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shared-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Shared Kotlin compilation
        run: |
          ./gradlew \
            :composeApp:compileKotlinMetadata \
            :composeApp:compileDebugKotlinAndroid \
            :composeApp:compileReleaseKotlinAndroid

  android-debug:
    needs: shared-compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/**/*.apk
          if-no-files-found: error

  android-release:
    needs: shared-compile
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Gradle Setup
        uses: ./.github/actions/gradle-setup
        with:
          cache-read-only: false

      - name: Decode release keystore
        env:
          RELEASE_STORE_BASE64: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          set +x
          base64 --decode > release.keystore <<< "$RELEASE_STORE_BASE64"

      - name: Configure signing properties
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set +x
          cat > local.properties << PROPERTIES_EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
          RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
          PROPERTIES_EOF

      - name: Build release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Cleanup sensitive files
        if: always()
        run: rm -f release.keystore local.properties

      - name: Upload release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          if-no-files-found: error
