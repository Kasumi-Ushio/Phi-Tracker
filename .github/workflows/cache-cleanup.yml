name: Cache Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR caches
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          gh cache list --ref "$BRANCH" --limit 100 --json id --jq '.[].id' \
            | xargs -r -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
